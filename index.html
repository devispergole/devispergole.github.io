<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis Pergole Türkiye | Modern Yaşam Alanları</title>
    <link rel="stylesheet" href="stil.css">
    <!-- FontAwesome (İkonlar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- ÜST MENÜ (HEADER) -->
    <header>
        <div class="logo">
            <span class="gold-text">DEVIS</span> <span class="white-text">PERGOLE</span>
        </div>
        <nav>
            <a href="#anasayfa">Ana Sayfa</a>
            <a href="#hizmetler">Hizmetlerimiz</a>
            <a href="#projeler">Projelerimiz</a>
            <a href="#iletisim" class="btn-teklif">Teklif Al</a>
        </nav>
    </header>

    <!-- ANA GÖRSEL (HERO SECTION) -->
    <section id="anasayfa" class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h4>YAŞAM ALANLARINIZA</h4>
            <h1>DEĞER KATIYORUZ</h1>
            <p>Pergole ve Cam Sistemlerinde Kalite, Estetik ve Güvenin Adresi</p>
            <div class="hero-buttons">
                <a href="https://wa.me/905537039690" class="btn-primary"><i class="fab fa-whatsapp"></i> WhatsApp'tan İletişime Geç</a>
            </div>
        </div>
    </section>

    <!-- HİZMETLERİMİZ -->
    <section id="hizmetler" class="services-section">
        <h2 class="section-title">HİZMETLERİMİZ</h2>
        <div class="services-grid">
            <!-- Hizmet 1 -->
            <div class="service-card">
                <img src="images/rolling-roof.jpg" alt="Rolling Roof Pergole">
                <h3>ROLLING ROOF PERGOLE</h3>
            </div>
            <!-- Hizmet 2 -->
            <div class="service-card">
                <img src="images/bioklimatik.jpg" alt="Bioklimatik Pergole">
                <h3>BİOKLİMATİK PERGOLE</h3>
            </div>
            <!-- Hizmet 3 -->
            <div class="service-card">
                <img src="images/giyotin-cam.jpg" alt="Giyotin Cam">
                <h3>GİYOTİN CAM</h3>
            </div>
            <!-- Hizmet 4 -->
            <div class="service-card">
                <img src="images/zip-perde.jpg" alt="Zip Perde">
                <h3>ZİP PERDE</h3>
            </div>
            <!-- Hizmet 5 -->
            <div class="service-card">
                <img src="images/cam-balkon.jpg" alt="Cam Balkon">
                <h3>CAM BALKON</h3>
            </div>
            <!-- Hizmet 6 -->
            <div class="service-card">
                <img src="images/kis-bahcesi.jpg" alt="Kış Bahçesi">
                <h3>KIŞ BAHÇESİ</h3>
            </div>
        </div>
    </section>

    <!-- WHATSAPP BUTONU (SAĞ ALT) -->
    <a href="https://wa.me/905537039690" class="float-whatsapp" target="_blank">
        <i class="fab fa-whatsapp my-float"></i>
    </a>

</body>
</html>
